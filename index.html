<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: center;
    gap: 40px;
    background: #1e293b;
    padding: 15px;
    color: white;
}

.nav-item {
    cursor: pointer;
    font-weight: bold;
    position: relative;
}

/* Navbar Hover Effect */
.nav-item::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 3px;
    background: #38bdf8;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.nav-item:hover::after {
    width: 100%;
}

/* Content */
.content {
    padding: 30px;
}

/* Sections */
.section {
    display: none;
}

.active {
    display: block;
}

/* Button Container */
.button-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

/* Buttons */
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    font-weight: bold;
    transition: 0.3s ease;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

button:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

button:active {
    transform: scale(0.95);
}

/* Center Text */
h1, p {
    text-align: center;
}

/* Images */
img {
    display: block;
    margin: 15px auto;
    width: 120px;
}
</style>

</head>

<body>

<div class="navbar">
  <div class="nav-item" onclick="showSection('batches')">Batches</div>
  <div class="nav-item" onclick="showSection('study')">Study</div>
  <div class="nav-item" onclick="showSection('profile')">Profile</div>
  <div class="nav-item" onclick="showSection('chat')">Chat</div>
</div>

<div class="content">
  
  <div id="batches" class="section active">

    <div class="button-container">
        <button>Class 09</button>
        <button>Class 10</button>
        <button>Class 11</button>
        <button>Class 12</button>
    </div>

    <h1 style="color:red;">Batches</h1>
    <p style="color:green;">Your batches will show here.</p>

    <img src="logo.png">
    <img src="logo.png">
    <img src="logo.png">

  </div>

  <div id="study" class="section">
    <h2>Study</h2>
    <p>Study materials here.</p>
  </div>

  <div id="profile" class="section">
    <h2>Profile</h2>
    <p>Your profile details.</p>
  </div>

  <div id="chat" class="section">
    <h2>Chat</h2>
    <p>Chat system coming soon...</p>
  </div>

</div>

<script>
function showSection(id) {
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
